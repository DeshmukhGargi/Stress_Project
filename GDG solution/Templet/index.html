<!DOCTYPE html>
<html>
<head>
    <title>AI Stress Detector</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    background-color: #f0f8ff;
}

textarea {
    width: 300px;
    padding: 10px;
}

button {
    padding: 10px 20px;
    background-color: #4CAF50;
    color: white;
    border: none;
}

#result {
    font-size: 20px;
    margin-top: 20px;
}
</style>
</head>
<body>

<h2>AI Stress Detection</h2>

<textarea id="inputText" rows="5" cols="40" placeholder="Type how you feel..."></textarea><br><br>

<button onclick="checkStress()">Check Stress</button>

<p id="result"></p>

<script>
function checkStress() {
    let text = document.getElementById("inputText").value;

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({text: text})
    })
    .then(response => response.json())
    .then(data => {
    if (data.stress == 1) {
        document.getElementById("result").innerText =
        "High Stress 😟\nTake a break, talk to a friend, try deep breathing.";
    } else {
        document.getElementById("result").innerText =
        "Low Stress 😊 Keep going, you're doing great!";
    }
});
   
}
</script>

</body>
</html>
